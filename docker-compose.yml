services:
  db:
    image: postgres:15
    environment:
    - POSTGRES_USER=${DB_USER}
    - POSTGRES_PASSWORD=${DB_PASSWORD}
    - POSTGRES_DB=${NAME_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    ports: 
      - "5000:8080"
    depends_on:
      - db
    volumes:
      - .:/app
    working_dir: /app
    command: dotnet watch run --non-interactive --urls=http://0.0.0.0:8080
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=${NAME_DB};Username=${DB_USER};Password=${DB_PASSWORD};
      - ASPNETCORE_ENVIRONMENT=Development
      - DotNetWatch_USE_POLLING_FILE_WATCHER=1
      - JWT__KEY=${JWT_KEY}
    stdin_open: true
    tty: true

volumes:
    postgres_data: