services:
  db:
    image: postgres:15
    environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=12345
    - POSTGRES_DB=MyFirstProjectDB
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    ports: 
      - "5000:8080"
    depends_on:
      - db
    volumes:
      - .:/app
    working_dir: /app
    command: dotnet watch run --non-interactive --urls=http://0.0.0.0:8080
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=MyFirstProjectDB;Username=postgres;Password=12345;
      - ASPNETCORE_ENVIRONMENT=Development
      - DotNetWatch_USE_POLLING_FILE_WATCHER=1
    stdin_open: true
    tty: true

volumes:
    postgres_data: